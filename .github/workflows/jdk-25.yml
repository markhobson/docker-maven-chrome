name: jdk-25

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/jdk-25.yml'
      - 'jdk-25/**'
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
    
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./jdk-25
          tags: markhobson/maven-chrome:jdk-25,markhobson/maven-chrome:latest
          push: true
