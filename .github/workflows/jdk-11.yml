name: jdk-11

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/jdk-11.yml'
      - 'jdk-11/**'
  workflow_dispatch:

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
    
      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: ./jdk-11
          tags: markhobson/maven-chrome:jdk-11
          push: true
